<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="IoTopia – Create a free account to share your IoT articles and tutorials."/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <title>IoTopia – Create Account</title>
</head>
<body>

  <!-- NAV -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">IoT<span>opia</span></a>
      <ul class="nav-links" role="list">
        <li><a href="index.html">Home</a></li>
        <li><a href="applications.html">Applications</a></li>
        <li><a href="devices.html">Devices</a></li>
        <li><a href="tutorials.html">Tutorials</a></li>
        <li><a href="news.html">News</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="btn btn-primary nav-cta">Contact Us</a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle navigation menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <!-- REGISTER FORM -->
  <main class="auth-page" id="main-content">
    <div class="auth-card">
      <a href="index.html" class="auth-logo">IoT<span>opia</span></a>
      <h1>Create your account</h1>
      <p class="auth-sub">Join IoTopia to share your own IoT articles and tutorials with the community.</p>

      <div class="auth-alert" id="regAlert" role="alert"></div>

      <form id="registerForm" novalidate>
        <div class="form-group">
          <label for="regName">Full Name *</label>
          <input type="text" id="regName" name="name" placeholder="Your full name"
                 autocomplete="name" aria-required="true"/>
          <span class="form-error" id="regNameErr" role="alert"></span>
        </div>
        <div class="form-group">
          <label for="regEmail">Email Address *</label>
          <input type="email" id="regEmail" name="email" placeholder="your@email.com"
                 autocomplete="email" aria-required="true"/>
          <span class="form-error" id="regEmailErr" role="alert"></span>
        </div>
        <div class="form-group">
          <label for="regPassword">Password *</label>
          <div style="position:relative;">
            <input type="password" id="regPassword" name="password"
                   placeholder="At least 6 characters"
                   autocomplete="new-password" aria-required="true" style="padding-right:48px;"/>
            <button type="button" onclick="togglePwd('regPassword',this)"
                    style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--grey-mid);font-size:1rem;"
                    aria-label="Toggle password visibility">
              <i class="fas fa-eye" aria-hidden="true"></i>
            </button>
          </div>
          <span class="form-error" id="regPasswordErr" role="alert"></span>
        </div>
        <div class="form-group">
          <label for="regConfirm">Confirm Password *</label>
          <div style="position:relative;">
            <input type="password" id="regConfirm" name="confirm"
                   placeholder="Repeat your password"
                   autocomplete="new-password" aria-required="true" style="padding-right:48px;"/>
            <button type="button" onclick="togglePwd('regConfirm',this)"
                    style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--grey-mid);font-size:1rem;"
                    aria-label="Toggle confirm password visibility">
              <i class="fas fa-eye" aria-hidden="true"></i>
            </button>
          </div>
          <span class="form-error" id="regConfirmErr" role="alert"></span>
        </div>

        <!-- Terms checkbox -->
        <div class="form-group" style="display:flex;align-items:flex-start;gap:11px;margin-top:4px;">
          <input type="checkbox" id="regTerms" name="terms" style="width:auto;margin-top:4px;accent-color:var(--primary);"/>
          <label for="regTerms" style="font-size:0.85rem;font-weight:400;color:var(--text-muted);cursor:pointer;">
            I agree to the <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>. My data is processed in accordance with GDPR. *
          </label>
        </div>
        <span class="form-error" id="regTermsErr" role="alert" style="display:block;margin-top:-8px;margin-bottom:12px;"></span>

        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:14px;margin-top:8px;">
          Create Account <i class="fas fa-user-plus" aria-hidden="true"></i>
        </button>
      </form>

      <div class="auth-divider"><span>or</span></div>
      <div class="auth-switch">
        Already have an account? <a href="login.html">Log in</a>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
    if (IoTopia.isLoggedIn()) window.location.href = 'dashboard.html';

    function togglePwd(id, btn) {
      var inp = document.getElementById(id);
      var isText = inp.type === 'text';
      inp.type = isText ? 'password' : 'text';
      btn.querySelector('i').className = isText ? 'fas fa-eye' : 'fas fa-eye-slash';
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var name     = document.getElementById('regName').value;
      var email    = document.getElementById('regEmail').value;
      var password = document.getElementById('regPassword').value;
      var confirm  = document.getElementById('regConfirm').value;
      var terms    = document.getElementById('regTerms').checked;
      var alertEl  = document.getElementById('regAlert');

      // Reset all errors
      ['regName','regEmail','regPassword','regConfirm'].forEach(function(id) {
        document.getElementById(id).classList.remove('input-error');
      });
      ['regNameErr','regEmailErr','regPasswordErr','regConfirmErr','regTermsErr'].forEach(function(id) {
        document.getElementById(id).classList.remove('show');
      });
      alertEl.className = 'auth-alert';

      var valid = true;

      function showErr(inputId, errId, msg) {
        document.getElementById(inputId).classList.add('input-error');
        var el = document.getElementById(errId);
        el.textContent = msg;
        el.classList.add('show');
        valid = false;
      }

      if (name.trim().length < 2) showErr('regName', 'regNameErr', 'Please enter your full name.');
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) showErr('regEmail', 'regEmailErr', 'Please enter a valid email address.');
      if (password.length < 6) showErr('regPassword', 'regPasswordErr', 'Password must be at least 6 characters.');
      if (password !== confirm) showErr('regConfirm', 'regConfirmErr', 'Passwords do not match.');
      if (!terms) {
        var el = document.getElementById('regTermsErr');
        el.textContent = 'You must agree to the Terms and Privacy Policy to continue.';
        el.classList.add('show');
        valid = false;
      }

      if (!valid) return;

      var result = IoTopia.register(name, email, password);
      if (result.ok) {
        alertEl.className = 'auth-alert success';
        alertEl.textContent = 'Account created! Redirecting to your dashboard…';
        setTimeout(function() { window.location.href = 'dashboard.html'; }, 1200);
      } else {
        alertEl.className = 'auth-alert error';
        alertEl.textContent = result.msg;
      }
    });
  </script>
</body>
</html>
